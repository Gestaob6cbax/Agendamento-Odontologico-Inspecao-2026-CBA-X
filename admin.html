<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Odontologia 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        header { background: #00838f; color: white; padding: 15px; text-align: center; border-radius: 10px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #eee; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn-del { color: red; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<header><h1>Painel Administrativo - ODONTOLOGIA</h1></header>

<div class="controls">
    <input type="text" id="lupa" placeholder="🔍 Buscar por RG ou Nome..." onkeyup="filtrar()">
    <button onclick="carregar()" style="padding:10px; cursor:pointer;">🔄 Atualizar</button>
</div>

<table>
    <thead>
        <tr>
            <th>Data</th>
            <th>Turno</th>
            <th>Militar</th>
            <th>RG</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<script>
    const firebaseConfig = { /* MESMO DO MÉDICO */
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregar() {
        const snap = await db.collection("agendamentos_odonto").get();
        let lista = [];
        snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
        
        // Ordenação por data
        lista.sort((a,b) => {
            let da = a.data.split('/').reverse().join('');
            let db = b.data.split('/').reverse().join('');
            return da.localeCompare(db);
        });

        let html = "";
        lista.forEach(d => {
            html += `<tr>
                <td><b>${d.data}</b></td>
                <td>${d.turno}</td>
                <td>${d.nome}</td>
                <td>${d.rg}</td>
                <td><button class="btn-del" onclick="excluir('${d.id}')">🗑️</button></td>
            </tr>`;
        });
        document.getElementById("tabela").innerHTML = html;
    }

    function filtrar() {
        let val = document.getElementById("lupa").value.toUpperCase();
        let rows = document.querySelectorAll("#tabela tr");
        rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none");
    }

    async function excluir(id) {
        if(confirm("Liberar vaga odontológica?")) {
            await db.collection("agendamentos_odonto").doc(id).delete();
            carregar();
        }
    }
    window.onload = carregar;
</script>
</body>
</html>
