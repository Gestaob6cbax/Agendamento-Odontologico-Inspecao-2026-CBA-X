<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Inspeção Odontológica 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --cba-blue: #0a2c6d; --cba-gold: #b8860b; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; color: #333; }
        header { background: var(--cba-blue); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--cba-gold); }
        header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 10px; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--cba-blue); }
        .controls { background: white; padding: 20px; border-radius: 10px; display: flex; gap: 15px; margin-bottom: 20px; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .search-input { flex-grow: 2; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        .badge-local { background: #e7f0ff; color: #0a2c6d; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .btn-export { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>

<header>
    <h1>Painel Administrativo - Odontologia 2026</h1>
    <p>CBA X - SALVAMENTO MARÍTIMO</p>
</header>

<div class="container">
    <div class="stats-row">
        <div class="stat-card">
            <span style="font-size: 12px; font-weight: bold; color: #777; text-transform: uppercase;">Total de Agendados</span><br>
            <strong id="contador" style="font-size: 24px; color: var(--cba-blue);">0</strong>
        </div>
        <div class="stat-card">
            <span style="font-size: 12px; font-weight: bold; color: #777; text-transform: uppercase;">Status do Sistema</span><br>
            <strong id="status-db" style="font-size: 16px; color: var(--success);">Online</strong>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="buscaNome" class="search-input" placeholder="Buscar por Nome ou RG..." onkeyup="filtrarTabela()">
        <button class="btn-export" onclick="exportarExcel()">📊 Exportar Excel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Local Inspeção</th>
                <th>Unidade Origem</th>
                <th>Data</th>
                <th>Hora</th>
                <th>Posto/Grad</th>
                <th>Nome Completo</th>
                <th>RG</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            <tr><td colspan="7" style="text-align:center">Carregando dados...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function carregarDados() {
        db.collection("agendamentos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const tabela = document.getElementById("tabela-corpo");
            const contador = document.getElementById("contador");
            tabela.innerHTML = "";
            let total = 0;

            snapshot.forEach((doc) => {
                const d = doc.data();
                total++;

                // Tradução amigável dos códigos para nomes reais
                let destinoBonito = d.unidadeDestino || "Não informado";
                if(destinoBonito === "1GMAR") destinoBonito = "1º GMAR - Botafogo";
                if(destinoBonito === "2GMAR") destinoBonito = "2º GMAR - Barra";
                if(destinoBonito === "3GMAR") destinoBonito = "3º GMAR - Copacabana";
                if(destinoBonito === "4GMAR") destinoBonito = "4º GMAR - Itaipu";

                tabela.innerHTML += `
                    <tr>
                        <td><span class="badge-local">${destinoBonito}</span></td>
                        <td>${d.unidadeOrigem || '---'}</td>
                        <td>${d.data || '---'}</td>
                        <td><strong>${d.horario || '---'}</strong></td>
                        <td>${d.posto || '---'}</td>
                        <td>${d.nome || '---'}</td>
                        <td>${d.rg || '---'}</td>
                    </tr>
                `;
            });
            contador.innerText = total;
        });
    }

    function filtrarTabela() {
        const termo = document.getElementById("buscaNome").value.toUpperCase();
        const linhas = document.querySelectorAll("#tabela-corpo tr");
        linhas.forEach(linha => {
            linha.style.display = linha.innerText.toUpperCase().includes(termo) ? "" : "none";
        });
    }

    function exportarExcel() {
        const tabela = document.querySelector("table");
        const wb = XLSX.utils.table_to_book(tabela);
        XLSX.writeFile(wb, "Relatorio_Agendamento_Odonto.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
