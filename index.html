<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        /* Mesma paleta de cores e estilo do seu ADM */
        :root { --primary-blue: #0a2c6d; --bg-gray: #f0f2f5; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; }
        
        .container { max-width: 550px; margin: 30px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary-blue); }
        
        header { text-align: center; margin-bottom: 30px; }
        header h2 { color: var(--primary-blue); margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 20px; }
        header p { color: #666; font-size: 14px; margin: 0; }

        label { display: block; margin-top: 18px; font-size: 13px; color: #444; font-weight: bold; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        
        input:focus, select:focus { border-color: var(--primary-blue); box-shadow: 0 0 8px rgba(10, 44, 109, 0.1); }

        button { width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 30px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        
        button:hover { background: #082152; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .success-area { display: none; text-align: center; padding: 20px; }
        .success-icon { font-size: 50px; color: #28a745; margin-bottom: 15px; }
        
        .info-box { background: #f8f9fa; border-left: 4px solid var(--primary-blue); padding: 15px; text-align: left; margin-top: 20px; font-size: 14px; line-height: 1.6; }

        .footer { text-align: center; margin-top: 25px; font-size: 11px; color: #999; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <header>
        <img src="logo.png" style="width: 85px;" alt="CBA X" onerror="this.style.display='none';">
        <h2>Agendamento Odontológico</h2>
        <p>Sistema de Saúde CBA X - 2026</p>
    </header>

    <label>Posto / Graduação</label>
    <select id="posto">
        <option value="">Selecione...</option>
        <option>CORONEL</option><option>TENENTE CORONEL</option><option>MAJOR</option><option>CAPITÃO</option>
        <option>1º TENENTE</option><option>2º TENENTE</option><option>SUBTENENTE</option>
        <option>1º SARGENTO</option><option>2º SARGENTO</option><option>3º SARGENTO</option>
        <option>CABO</option><option>SOLDADO</option>
    </select>

    <label>Nome Completo</label>
    <input type="text" id="nome" placeholder="Ex: JOÃO DA SILVA">

    <label>RG Militar</label>
    <input type="number" id="rg" placeholder="Digite apenas os números">

    <label>Unidade de Origem (Onde você serve)</label>
    <select id="unidadeServe">
        <option value="">Selecione...</option>
        <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option><option>3º GMAR</option>
        <option>4º GMAR</option><option>DBM 1/M</option><option>DBM 2/M</option><option>DBM 3/M</option>
        <option>DBM 4/M</option><option>DBM 5/M</option><option>DBM 6/M</option>
    </select>

    <label>Local da Inspeção (Destino)</label>
    <select id="unidade">
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data Escolhida</label>
    <input type="date" id="data">

    <label>Horário</label>
    <select id="horario">
        <option value="">Selecione...</option>
        <option>08:00</option><option>09:00</option><option>10:00</option>
        <option>11:00</option><option>13:00</option><option>14:00</option><option>15:00</option>
    </select>

    <button onclick="enviarDados()">Confirmar Agendamento</button>
    <div class="footer">CBA X - Comando de Bombeiros de Área</div>
</div>

<div class="container success-area" id="success-area">
    <div class="success-icon">✅</div>
    <h2>Agendamento Realizado!</h2>
    <p>Seus dados foram sincronizados com o Painel Administrativo.</p>
    
    <div class="info-box" id="resumo"></div>
    
    <button onclick="location.reload()" style="background: #666; margin-top: 20px;">Realizar novo agendamento</button>
</div>

<script>
    // CONFIGURAÇÃO IDENTICA AO SEU ADM
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function enviarDados() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value.toUpperCase();
        const local = document.getElementById('unidade').value;
        const dataVal = document.getElementById('data').value;
        const horaVal = document.getElementById('horario').value;

        // Validação simples
        if(!rg || !nome || !local || !dataVal || !horaVal) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        const dados = {
            nome: nome,
            rg: rg,
            posto: document.getElementById('posto').value,
            unidadeServe: document.getElementById('unidadeServe').value, // Origem
            unidade: local,                                            // Local (o que o ADM filtra)
            data: dataVal.split('-').reverse().join('/'),               // Converte para DD/MM/AAAA para o ADM
            horario: horaVal,
            timestamp: new Date()
        };

        try {
            // Verifica se o RG já existe para evitar duplicados
            const busca = await db.collection("agendamentos").where("rg", "==", rg).get();
            if(!busca.empty) {
                alert("Este RG já possui um agendamento cadastrado!");
                return;
            }

            // Salva na coleção "agendamentos" (mesma do ADM)
            await db.collection("agendamentos").add(dados);
            
            // Exibe Sucesso
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            document.getElementById('resumo').innerHTML = `
                <strong>Militar:</strong> ${dados.posto} ${dados.nome}<br>
                <strong>Local:</strong> ${dados.unidade}<br>
                <strong>Data/Hora:</strong> ${dados.data} às ${dados.horario}
            `;

        } catch (error) {
            alert("Erro ao salvar: " + error.message);
        }
    }
</script>
</body>
</html>
