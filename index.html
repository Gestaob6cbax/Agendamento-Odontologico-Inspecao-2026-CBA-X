<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --odonto-blue: #0a2c6d; --success-green: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        h2 { color: var(--odonto-blue); text-transform: uppercase; font-size: 1.3rem; margin: 10px 0; }
        label { display: block; margin-top: 18px; font-weight: 600; color: #444; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--odonto-blue); outline: none; box-shadow: 0 0 5px rgba(10,44,109,0.2); }
        button { background: var(--odonto-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #082152; transform: translateY(-1px); }
        .success-box { display: none; text-align: center; padding: 20px; }
        .footer-logo { font-size: 0.75rem; color: #aaa; margin-top: 25px; text-align: center; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container" id="form-area">
    <header>
        <img src="https://raw.githubusercontent.com/Gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo.png" 
             style="width: 90px; height: auto; margin-bottom: 10px;" alt="Logo CBA X">
        <h2>Agendamento Odontológico</h2>
        <p style="color: #777; font-size: 0.9rem; margin: 0;">CBA X - Comando de Bombeiros de Área</p>
    </header>

    <label>Posto/Graduação:</label>
    <select id="posto" required>
        <option value="">Selecione...</option>
        <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
        <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
        <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
        <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="NOME SEM ABREVIAÇÕES" oninput="this.value = this.value.toUpperCase()">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Ex: 12345">

    <label>Unidade de Origem (Onde você serve):</label>
    <select id="unidadeServe">
        <option value="">Selecione...</option>
        <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option>
        <option>3º GMAR</option><option>4º GMAR</option><option>DBM 1/M</option>
        <option>DBM 2/M</option><option>DBM 3/M</option><option>DBM 4/M</option>
        <option>DBM 5/M</option><option>DBM 6/M</option>
    </select>

    <hr>

    <label>Local do Atendimento (Destino):</label>
    <select id="unidade" onchange="configurarAgenda()">
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data da Inspeção:</label>
    <input type="date" id="data" onchange="validarData()" disabled>
    <small id="avisoData" style="color: #888; font-size: 11px; display: block; margin-top: 4px;">Escolha o destino primeiro.</small>

    <label>Horário Disponível:</label>
    <select id="horario" disabled>
        <option value="">Selecione a data...</option>
    </select>

    <button onclick="salvar()">CONFIRMAR AGENDAMENTO</button>
    <div class="footer-logo">SISTEMA DE GESTÃO CBA X - 2026</div>
</div>

<div class="container success-box" id="success-area">
    <h2 style="color: var(--success-green);">✅ Agendamento Realizado!</h2>
    <p>Os dados foram enviados com sucesso.</p>
    <div id="resumo" style="text-align: left; background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 5px solid var(--success-green);"></div>
    <button onclick="location.reload()" style="background: #555;">Realizar Novo Agendamento</button>
</div>

<script>
// CONFIGURAÇÃO DA AGENDA CONFORME SUA LISTA
const agendaConfig = {
    "1GMAR": { // Quartas
        datas: ["2026-03-11", "2026-03-18", "2026-03-25", "2026-04-01", "2026-04-08", "2026-05-06", "2026-05-13", "2026-05-20", "2026-05-27", "2026-06-03", "2026-06-10", "2026-06-17", "2026-06-24", "2026-07-01", "2026-07-08", "2026-07-15", "2026-07-22", "2026-07-29"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15"]
    },
    "2GMAR": { // Terças
        datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15", "13:00", "13:15", "13:30", "13:45", "14:00", "14:15", "14:30"]
    },
    "3GMAR": { // Terças
        datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-07", "2026-04-14", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30"]
    },
    "4GMAR": { // Sextas
        datas: ["2026-04-10", "2026-04-17", "2026-05-08", "2026-05-15", "2026-05-22", "2026-05-29", "2026-06-05", "2026-06-12", "2026-06-19", "2026-06-26", "2026-07-03", "2026-07-10", "2026-07-17", "2026-07-24", "2026-07-31"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00"]
    }
};

function configurarAgenda() {
    const local = document.getElementById("unidade").value;
    const campoData = document.getElementById("data");
    const campoHora = document.getElementById("horario");
    
    campoData.value = "";
    campoHora.innerHTML = '<option value="">Selecione a data...</option>';
    campoHora.disabled = true;

    if (local) {
        campoData.disabled = false;
        document.getElementById("avisoData").innerText = "Agora escolha o dia permitido.";
    } else {
        campoData.disabled = true;
    }
}

function validarData() {
    const local = document.getElementById("unidade").value;
    const dataSelecionada = document.getElementById("data").value;
    const campoHorario = document.getElementById("horario");
    
    if (!agendaConfig[local].datas.includes(dataSelecionada)) {
        alert("Atenção: Não haverá inspeção nesta unidade no dia selecionado.");
        document.getElementById("data").value = "";
        campoHorario.disabled = true;
        return;
    }

    campoHorario.disabled = false;
    campoHorario.innerHTML = '<option value="">Selecione o horário...</option>';
    agendaConfig[local].horarios.forEach(hora => {
        campoHorario.innerHTML += `<option value="${hora}">${hora}</option>`;
    });
}

// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
    authDomain: "agendamento-odonto-cbax.firebaseapp.com",
    projectId: "agendamento-odonto-cbax",
    storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
    messagingSenderId: "545212689993",
    appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function salvar() {
    const rg = document.getElementById('rg').value;
    const nome = document.getElementById('nome').value;
    const local = document.getElementById('unidade').value;
    const dataVal = document.getElementById('data').value;
    const horaVal = document.getElementById('horario').value;

    if(!rg || !nome || !local || !dataVal || !horaVal) {
        return alert("Por favor, preencha Nome, RG, Local, Data e Horário!");
    }

    const dados = {
        nome, rg,
        posto: document.getElementById('posto').value,
        unidadeServe: document.getElementById('unidadeServe').value,
        unidade: local,
        data: dataVal.split('-').reverse().join('/'),
        horario: horaVal,
        timestamp: new Date()
    };

    try {
        const query = await db.collection("agendamentos").where("rg", "==", rg).get();
        if(!query.empty) {
            return alert("ERRO: Já existe um agendamento para este RG!");
        }

        await db.collection("agendamentos").add(dados);
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';
        document.getElementById('resumo').innerHTML = `
            <b>Militar:</b> ${dados.posto} ${dados.nome}<br>
            <b>Destino:</b> ${dados.unidade}<br>
            <b>Data/Hora:</b> ${dados.data} às ${dados.horario}
        `;
    } catch (e) {
        alert("Erro de conexão: " + e.message);
    }
}
</script>
</body>
</html>
