<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção Médica 2026 - CBA X</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f7f9; margin: 0; padding: 0; color: #1a1a1a;
        }
        header { 
            background: #8b0000; color: white; text-align: center; 
            padding: 25px 15px; border-bottom: 5px solid #660000;
        }
        header img { width: 80px; margin-bottom: 10px; }
        header h1 { font-size: 1.2rem; margin: 5px 0; text-transform: uppercase; }
        
        .container { 
            background: white; width: 94%; max-width: 550px; 
            margin: 20px auto; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-top: 4px solid #8b0000;
        }
        h2 {
            font-size: 1rem; color: #8b0000; border-bottom: 2px solid #eee; 
            padding-bottom: 8px; margin-top: 25px; text-transform: uppercase;
        }
        label { font-weight: 600; margin-top: 15px; display: block; font-size: 0.85rem; color: #444; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 1px solid #ced4da; border-radius: 8px; font-size: 15px;
        }

        /* CONTADOR VISUAL DE VAGAS */
        #vagasStatus { 
            background: #e6fffa; color: #234e52; padding: 15px; 
            border-radius: 8px; border: 1px solid #b2f5ea; 
            margin: 15px 0; font-size: 1rem; font-weight: bold; text-align: center;
        }
        .lotado { background: #fff5f5 !important; color: #c53030 !important; border-color: #feb2b2 !important; }

        .btn-principal { 
            margin-top: 20px; padding: 18px; background: #8b0000; 
            color: white; border: none; width: 100%; 
            font-size: 17px; font-weight: bold; border-radius: 10px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-principal:disabled { background: #ccc; cursor: not-allowed; }
        
        .confirmacao-box { display: none; }
        .item-conf { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; font-size: 1rem; }
        .label-conf { font-weight: bold; color: #555; width: 130px; display: inline-block; }

        @media print {
            header, .btn-principal, #btnVoltar { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="Logo CBA X">
    <h1>Inspeção Médica 2026 - CBA X</h1>
    <p>Agendamento Digital e Controle de Vagas</p>
</header>

<div class="container" id="formContainer">
    <h2>Dados do Militar</h2>

    <label>Posto / Graduação:</label>
    <select id="posto">
        <option value="">Selecione</option>
        <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option>
        <option>CAP BM</option><option>1º TEN BM</option><option>2º TEN BM</option>
        <option>SUBTEN BM</option><option>1º SGT BM</option><option>2º SGT BM</option>
        <option>3º SGT BM</option><option>CB BM</option><option>SD BM</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="NOME COMPLETO">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Somente números">

    <label>Unidade que o Militar Serve:</label>
    <select id="unidadeOrigem">
        <option value="">Selecione</option>
        <option>CBA X</option><option>1º GMAR</option><option>DBM 1/M</option>
        <option>DBM 2/M</option><option>2º GMAR</option><option>DBM 3/M</option>
        <option>DBM 4/M</option><option>DBM 5/M</option><option>4º GMAR</option>
        <option>DBM 6/M</option>
    </select>

    <label>Telefone / WhatsApp:</label>
    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">

    <label>E-mail:</label>
    <input type="email" id="email" placeholder="email@exemplo.com">

    <h2>Agendamento</h2>

    <label>Local da Inspeção (Destino):</label>
    <select id="localInspecao" onchange="gerarDatas()">
        <option value="">Selecione o local...</option>
        <option value="BARRA" data-vagas="5">2º GMAR (Barra) / CER - Seg a Sex</option>
        <option value="COPA" data-vagas="5">3º GMAR (Copacabana) - Seg a Sex</option>
        <option value="SEPETIBA" data-vagas="7">DBM 5/M (Sepetiba) - Ter e Sex</option>
        <option value="CBAX" data-vagas="7">CBA X (Sede) - Ter e Sex</option>
        <option value="GRUPO1" data-vagas="7">1º GMAR / DBM 1/M / DBM 2/M - Ter e Sex</option>
        <option value="ITAIPU" data-vagas="7">4º GMAR / DBM 6/M - Ter e Sex</option>
        <option value="RECREIO" data-vagas="7">DBM 3/M / DBM 4/M (No Recreio) - Ter e Sex</option>
    </select>

    <label>Data:</label>
    <select id="data" onchange="contarVagasNoFirebase()"></select>

    <div id="vagasStatus" style="display:none;"></div>

    <button class="btn-principal" id="btnAgendar" onclick="finalizarAgendamento()">Confirmar Agendamento</button>
</div>

<div class="container confirmacao-box" id="confirmacaoBox"></div>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Máscara de Telefone
    document.getElementById('telefone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // DETALHAMENTO DAS REGRAS DE DATAS
    const REGRAS = {
        "BARRA":    { ini: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5] },
        "COPA":     { ini: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5] },
        "SEPETIBA": { ini: "2026-02-23", fim: "2026-03-05", dias: [2,5] },
        "CBAX":     { ini: "2026-03-10", fim: "2026-03-13", dias: [2,5] },
        "GRUPO1":   { ini: "2026-03-17", fim: "2026-05-15", dias: [2,5] },
        "ITAIPU":   { ini: "2026-05-19", fim: "2026-06-26", dias: [2,5] },
        "RECREIO":  { ini: "2026-06-30", fim: "2026-07-31", dias: [2,5] }
    };

    function gerarDatas() {
        let local = document.getElementById("localInspecao").value;
        let selD = document.getElementById("data");
        selD.innerHTML = "<option value=''>Selecione a Data</option>";
        if(!local) return;

        let config = REGRAS[local];
        let d = new Date(config.ini + "T12:00:00");
        let dFim = new Date(config.fim + "T12:00:00");

        while(d <= dFim) {
            if(config.dias.includes(d.getDay())) {
                let ymd = d.toISOString().split('T')[0];
                let opt = document.createElement("option");
                opt.value = ymd; opt.textContent = ymd.split('-').reverse().join('/');
                selD.appendChild(opt);
            }
            d.setDate(d.getDate() + 1);
        }
        document.getElementById("vagasStatus").style.display = "none";
    }

    // CONTADOR DE VAGAS EM TEMPO REAL
    async function contarVagasNoFirebase() {
        let local = document.getElementById("localInspecao").value;
        let data = document.getElementById("data").value;
        let status = document.getElementById("vagasStatus");
        let btn = document.getElementById("btnAgendar");

        if(!local || !data) return;

        status.style.display = "block";
        status.innerHTML = "Consultando disponibilidade...";
        
        let limite = parseInt(document.getElementById("localInspecao").options[document.getElementById("localInspecao").selectedIndex].dataset.vagas);

        // Busca quantos já agendaram para este local e data específicos
        const snapshot = await db.collection("agendamentos_inspecao")
                                 .where("localId", "==", local)
                                 .where("data", "==", data)
                                 .get();
        
        let ocupadas = snapshot.size;

        status.innerHTML = `Vagas Preenchidas: ${ocupadas} de ${limite} disponíveis`;
        
        if(ocupadas >= limite) {
            status.classList.add("lotado");
            status.innerHTML = `❌ DIA ESGOTADO (${ocupadas}/${limite} vagas)`;
            btn.disabled = true;
        } else {
            status.classList.remove("lotado");
            btn.disabled = false;
        }
    }

    async function finalizarAgendamento() {
        let rg = document.getElementById("rg").value;
        let nome = document.getElementById("nome").value;
        let posto = document.getElementById("posto").value;
        let local = document.getElementById("localInspecao").value;
        let data = document.getElementById("data").value;

        if(!rg || !nome || !posto || !local || !data) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        // Validação de Duplicidade por RG
        const check = await db.collection("agendamentos_inspecao").where("rg","==",rg).get();
        if(!check.empty){
            alert("Este RG já possui um agendamento registrado!");
            return;
        }

        let dadosAgendamento = {
            posto: posto,
            nome: nome.toUpperCase(),
            rg: rg,
            unidadeOrigem: document.getElementById("unidadeOrigem").value,
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            localId: local,
            localNome: document.getElementById("localInspecao").options[document.getElementById("localInspecao").selectedIndex].text,
            data: data,
            protocolo: "MED-" + rg + "-" + Date.now().toString().slice(-4),
            criadoEm: new Date()
        };

        try {
            // 1. Salva no Firebase (Para o contador funcionar)
            await db.collection("agendamentos_inspecao").add(dadosAgendamento);
            
            // 2. Envia para a Planilha do Google (Link Webhook)
            fetch("https://script.google.com/macros/s/AKfycbxIJt65s66K11eVJlBJQeg_6oJd02Zs3yu7gJ-Pdh3Q6lYGgM9e9vR8r-fFfggdQ95DHw/exec", {
                method: "POST", mode: "no-cors",
                body: JSON.stringify(dadosAgendamento)
            });

            exibirConfirmacao(dadosAgendamento);
        } catch (e) {
            alert("Erro ao processar agendamento. Tente novamente.");
        }
    }

    function exibirConfirmacao(d) {
        document.getElementById("formContainer").style.display = "none";
        let box = document.getElementById("confirmacaoBox");
        box.style.display = "block";
        box.innerHTML = `
            <h2 style="color:green; text-align:center">✅ Agendamento Confirmado!</h2>
            <div class="item-conf"><span class="label-conf">Militar:</span> ${d.posto} ${d.nome}</div>
            <div class="item-conf"><span class="label-conf">RG:</span> ${d.rg}</div>
            <div class="item-conf"><span class="label-conf">Local:</span> ${d.localNome}</div>
            <div class="item-conf"><span class="label-conf">Data:</span> ${d.data.split('-').reverse().join('/')}</div>
            <div class="item-conf"><span class="label-conf">Protocolo:</span> ${d.protocolo}</div>
            <br>
            <button class="btn-principal" onclick="window.print()">💾 Imprimir Comprovante</button>
            <button class="btn-principal" style="background:#666" id="btnVoltar" onclick="location.reload()">Novo Agendamento</button>
        `;
    }
</script>
</body>
</html>
