<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendamento Odontológico 2026 - CBA X</title>



    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>



    <style>

        * { box-sizing: border-box; }



        body { 

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 

            background: #f4f7f9; 

            margin: 0; padding: 0; color: #1a1a1a;

        }



        header { 

            background: #0a2c6d; color: white; text-align: center; 

            padding: 30px 15px; border-bottom: 5px solid #082152;

        }



        header img { width: 85px; margin-bottom: 10px; }

        header h1 { font-size: 1.3rem; margin: 5px 0; font-weight: 700; }

        header p { margin: 0; font-size: 0.9rem; opacity: 0.9; }



        .container { 

            background: white; width: 94%; max-width: 500px; 

            margin: 20px auto; padding: 25px; 

            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 

        }



        h2 {

            font-size: 1.1rem; color: #0a2c6d;

            border-bottom: 2px solid #eee; padding-bottom: 8px;

            margin-top: 25px; text-transform: uppercase;

        }



        label { font-weight: 600; margin-top: 15px; display: block; font-size: 0.9rem; color: #444; }



        input, select { 

            width: 100%; padding: 12px; margin-top: 6px; 

            border: 1px solid #ced4da; border-radius: 8px;

            font-size: 16px; background-color: #ffffff;

        }



        /* ALERTA DE VAGAS ESTILO INSPEÇÃO */

        .info-vagas { 

            background: #fff3cd; color: #856404; padding: 12px; 

            border-radius: 8px; border: 1px solid #ffeeba; 

            margin: 15px 0; font-size: 0.9rem; font-weight: bold; 

            text-align: center;

        }



        .btn-principal { 

            margin-top: 25px; padding: 18px; background: #063958; 

            color: white; border: none; width: 100%; 

            font-size: 18px; font-weight: bold; border-radius: 10px;

            cursor: pointer; transition: 0.3s;

        }



        .btn-principal:disabled { background: #ccc; cursor: not-allowed; }



        .confirmacao-item { margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        .confirmacao-label { font-weight: bold; color: #333; }



        @media print {

            header, .btn-principal, .btn-novo { display: none; }

            .container { box-shadow: none; border: none; width: 100%; }

        }

    </style>

</head>

<body>



<header>

    <img src="logo.png" alt="Logo CBA X">

    <h1>Agendamento Odontológico 2026</h1>

    <p>Comando de Bombeiros de Área X</p>

</header>



<div class="container" id="formContainer">

    <h2>Dados do Militar</h2>



    <label>Posto/Graduação:</label>

    <select id="posto">

        <option value="">Selecione</option>

        <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option><option>CAP BM</option>

        <option>1º TEN BM</option><option>2º TEN BM</option><option>SUBTEN BM</option><option>1º SGT BM</option>

        <option>2º SGT BM</option><option>3º SGT BM</option><option>CB BM</option><option>SD BM</option>

    </select>



    <label>Nome Completo:</label>

    <input type="text" id="nome" placeholder="Nome Completo">



    <label>RG:</label>

    <input type="number" id="rg" placeholder="Somente números">



    <label>Telefone:</label>

    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">



    <h2>Agendamento</h2>



    <label>Unidade de Atendimento:</label>

    <select id="unidade" onchange="carregarDatas()">

        <option value="">Selecione</option>

        <option value="1GMAR">1º GMAR - BOTAFOGO</option>

        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>

        <option value="3GMAR">3º GMAR - COPACABANA</option>

        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>

    </select>



    <label>Data:</label>

    <select id="data" onchange="carregarHorarios()"></select>



    <div id="vagasStatus" class="info-vagas" style="display:none;"></div>



    <label>Horário:</label>

    <select id="horario"></select>



    <button class="btn-principal" id="btnAgendar" onclick="salvar()">Confirmar Agendamento</button>

</div>



<div class="container" id="confirmacaoBox" style="display:none;"></div>



<script>

    // Configuração Firebase

    const firebaseConfig = {

        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",

        authDomain: "agendamento-odonto-cbax.firebaseapp.com",

        projectId: "agendamento-odonto-cbax",

        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",

        messagingSenderId: "545212689993",

        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"

    };



    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();



    // Máscara de Telefone

    document.getElementById('telefone').addEventListener('input', function (e) {

        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);

        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');

    });



    const datasMap = {

        "1GMAR": ["11/03/26","18/03/26","25/03/26","01/04/26","08/04/26"],

        "2GMAR": ["10/03/26","17/03/26","24/03/26","31/03/26","28/04/26"],

        "3GMAR": ["10/03/26","17/03/26","24/03/26","31/03/26"],

        "4GMAR": ["10/04/26","17/04/26","24/04/26"]

    };



    function carregarDatas(){

        let uni = document.getElementById("unidade").value;

        let selD = document.getElementById("data");

        selD.innerHTML = "";

        if(!uni) return;

        datasMap[uni].forEach(d => {

            let op = document.createElement("option"); op.value=d; op.text=d;

            selD.appendChild(op);

        });

        carregarHorarios();

    }



    async function carregarHorarios(){

        let uni = document.getElementById("unidade").value;

        let data = document.getElementById("data").value;

        let selH = document.getElementById("horario");

        let status = document.getElementById("vagasStatus");

        

        if(!uni || !data) return;

        selH.innerHTML = "<option>Verificando...</option>";



        let todos = [];

        if(uni === "2GMAR"){

            // BARRA - 21 VAGAS (14 Manhã + 7 Tarde)

            todos = ["08:00","08:15","08:30","08:45","09:00","09:15","09:30","09:45","10:00","10:15","10:30","10:45","11:00","11:15","13:00","13:15","13:30","13:45","14:00","14:15","14:30"];

        } else if(uni === "1GMAR"){

            todos = ["08:00","08:15","08:30","08:45","09:00","09:15","09:30","09:45","10:00","10:15","10:30","10:45","11:00","11:15"];

        } else if(uni === "3GMAR"){

            todos = ["08:00","08:15","08:30","08:45","09:00","09:15","09:30","09:45","10:00","10:15","10:30"];

        } else if(uni === "4GMAR"){

            todos = ["08:00","08:15","08:30","08:45","09:00","09:15","09:30","09:45","10:00","10:15","10:30","10:45","11:00"];

        }



        const snapshot = await db.collection("agendamentos").where("unidade", "==", uni).where("data", "==", data).get();

        let ocupados = snapshot.docs.map(doc => doc.data().horario);

        let disponiveis = todos.filter(h => !ocupados.includes(h));



        selH.innerHTML = "";

        status.style.display = "block";



        if(disponiveis.length > 0){

            disponiveis.forEach(h => {

                let op = document.createElement("option"); op.value=h; op.text=h; selH.appendChild(op);

            });

            status.innerHTML = `VAGAS DISPONÍVEIS: ${disponiveis.length}`;

            status.style.background = "#fff3cd";

            document.getElementById("btnAgendar").disabled = false;

        } else {

            selH.innerHTML = "<option>LOTADO</option>";

            status.innerHTML = "❌ DIA SEM VAGAS DISPONÍVEIS";

            status.style.background = "#f8d7da";

            document.getElementById("btnAgendar").disabled = true;

        }

    }



    async function salvar(){

        let rg = document.getElementById("rg").value;

        let nome = document.getElementById("nome").value;

        let hor = document.getElementById("horario").value;

        if(!rg || !nome || hor === "LOTADO") { alert("Preencha os campos corretamente."); return; }



        // Bloqueio por RG

        const check = await db.collection("agendamentos").where("rg","==",rg).get();

        if(!check.empty){ alert("Este RG já possui agendamento!"); return; }



        let dados = {

            posto: document.getElementById("posto").value,

            nome: nome.toUpperCase(),

            rg: rg,

            telefone: document.getElementById("telefone").value,

            unidade: document.getElementById("unidade").value,

            data: document.getElementById("data").value,

            horario: hor,

            criadoEm: new Date()

        };



        try {

            await db.collection("agendamentos").add(dados);

            mostrarConfirmacao(dados);

        } catch (e) { alert("Erro ao salvar."); }

    }



    function mostrarConfirmacao(d){

        document.getElementById("formContainer").style.display = "none";

        let box = document.getElementById("confirmacaoBox");

        box.style.display = "block";

        box.innerHTML = `

            <h2 style="color:green; text-align:center">✅ Agendamento Realizado</h2>

            <div class="confirmacao-item"><span class="confirmacao-label">Militar:</span> ${d.posto} ${d.nome}</div>

            <div class="confirmacao-item"><span class="confirmacao-label">RG:</span> ${d.rg}</div>

            <div class="confirmacao-item"><span class="confirmacao-label">Local:</span> ${d.unidade}</div>

            <div class="confirmacao-item"><span class="confirmacao-label">Data:</span> ${d.data} às ${d.horario}</div>

            <button class="btn-principal" onclick="window.print()">💾 Imprimir Comprovante</button>

            <button class="btn-principal" style="background:#666" onclick="location.reload()">Novo Agendamento</button>

        `;

    }

</script>

</body>

</html>
